name: Generate Snake Animation

on:
  # Runs automatically every 24 hours (at midnight UTC)
  schedule:
    - cron: "0 0 * * *"
  
  # Allows you to manually trigger the workflow from the Actions tab anytime
  workflow_dispatch:
  
  # Runs every time you push a change to the main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates the snake SVGs from the repository owner's contributions
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Deploys the files in the 'dist' folder to an isolated 'output' branch
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
